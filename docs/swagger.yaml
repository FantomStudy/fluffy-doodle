basePath: /
definitions:
  presenter.AuthSwaggerErrorResponse:
    properties:
      error: {}
      status:
        type: boolean
    type: object
  presenter.AuthSwaggerSuccessResponse:
    properties:
      error: {}
      status:
        type: boolean
    type: object
  presenter.CreateForumCategoryRequest:
    properties:
      description:
        example: Обсуждение языка программирования Go
        type: string
      name:
        example: Вопросы по Go
        type: string
      order:
        example: 1
        type: integer
    type: object
  presenter.CreateForumCommentRequest:
    properties:
      content:
        example: Вот решение вашей проблемы...
        type: string
    type: object
  presenter.CreateForumTopicRequest:
    properties:
      categoryId:
        example: 1
        type: integer
      content:
        example: У меня вопрос по связям...
        type: string
      title:
        example: Как использовать GORM?
        type: string
    type: object
  presenter.CreateLessonRequest:
    properties:
      description:
        example: First lesson of the course
        type: string
      estimatedMinutes:
        example: 25
        type: integer
      isFreePreview:
        example: true
        type: boolean
      order:
        example: 1
        type: integer
      tasks:
        items:
          $ref: '#/definitions/presenter.CreateLessonTaskRequest'
        type: array
      title:
        example: Intro to Python
        type: string
    type: object
  presenter.CreateLessonTaskRequest:
    properties:
      correctOptionIds:
        items:
          type: string
        type: array
      description:
        example: Проверьте понимание темы
        type: string
      options:
        items:
          $ref: '#/definitions/presenter.CreateTaskOptionRequest'
        type: array
      question:
        example: Какие варианты верные?
        type: string
      title:
        example: Базовый тест
        type: string
      type:
        example: quiz
        type: string
    type: object
  presenter.CreateTaskOptionRequest:
    properties:
      id:
        example: a
        type: string
      text:
        example: Ответ A
        type: string
    type: object
  presenter.ErrorResponse:
    properties:
      error:
        example: Описание ошибки
        type: string
      success:
        example: false
        type: boolean
    type: object
  presenter.ForumAuthor:
    properties:
      avatar:
        type: string
      fullName:
        type: string
      id:
        type: integer
      role:
        type: string
      stars:
        type: integer
    type: object
  presenter.ForumCategoryResponse:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      topicsCount:
        type: integer
    type: object
  presenter.ForumCommentResponse:
    properties:
      author:
        $ref: '#/definitions/presenter.ForumAuthor'
      content:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      isSolution:
        type: boolean
    type: object
  presenter.ForumTopicDetailResponse:
    properties:
      comments:
        items:
          $ref: '#/definitions/presenter.ForumCommentResponse'
        type: array
      topic:
        $ref: '#/definitions/presenter.ForumTopicResponse'
    type: object
  presenter.ForumTopicResponse:
    properties:
      author:
        $ref: '#/definitions/presenter.ForumAuthor'
      categoryId:
        type: integer
      content:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      isSolved:
        type: boolean
      replies:
        type: integer
      title:
        type: string
      views:
        type: integer
    type: object
  presenter.FrameResponse:
    properties:
      id:
        example: 1
        type: integer
      image:
        example: https://minio.local/frame_1.png
        type: string
      name:
        example: Gold Frame
        type: string
      owned:
        example: true
        type: boolean
      price:
        example: 100
        type: integer
    type: object
  presenter.InsertCategoryRequest:
    properties:
      name:
        description: Название категории
        example: Веб-разработка
        type: string
    required:
    - name
    type: object
  presenter.LeaderboardResponse:
    properties:
      activeFrame:
        $ref: '#/definitions/presenter.FrameResponse'
      avatar:
        example: https://minio.local/avatar_1.png
        type: string
      fullName:
        example: Ivan Ivanov
        type: string
      id:
        example: 1
        type: integer
      level:
        example: 5
        type: integer
      stars:
        example: 150
        type: integer
    type: object
  presenter.MeResponse:
    properties:
      activeFrame:
        $ref: '#/definitions/presenter.FrameResponse'
      avatar:
        example: https://minio.local/avatar_1.png
        type: string
      exp:
        example: 45
        type: integer
      expToNextLevel:
        example: 55
        type: integer
      fullName:
        example: Ivan Ivanov
        type: string
      id:
        example: 1
        type: integer
      level:
        example: 1
        type: integer
      login:
        example: teacher01
        type: string
      ownedFrames:
        items:
          type: integer
        type: array
      phoneNumber:
        example: "+79001234567"
        type: string
      roleId:
        example: 2
        type: integer
      roleName:
        example: student
        type: string
      stars:
        example: 10
        type: integer
      streak:
        example: 4
        type: integer
      studentCode:
        example: STU-8A7KQ21M
        type: string
    type: object
  presenter.ParentChildProgressResponse:
    properties:
      achievements:
        example: 4
        type: integer
      activeFrame:
        $ref: '#/definitions/presenter.FrameResponse'
      exp:
        example: 45
        type: integer
      level:
        example: 1
        type: integer
      stars:
        example: 18
        type: integer
      studentCode:
        example: STU-8A7KQ21M
        type: string
      studentId:
        example: 12
        type: integer
      studentLogin:
        example: petya_ivanov
        type: string
      studentName:
        example: Petya Ivanov
        type: string
    type: object
  presenter.SignInRequest:
    properties:
      login:
        type: string
      password:
        type: string
    type: object
  presenter.SignUpRequest:
    properties:
      fullName:
        type: string
      login:
        type: string
      password:
        type: string
      phoneNumber:
        type: string
      studentCode:
        type: string
    type: object
  presenter.SuccessResponse:
    properties:
      data: {}
      message:
        example: Операция выполнена успешно
        type: string
      success:
        example: true
        type: boolean
    type: object
  presenter.UpdateCategoryRequest:
    properties:
      name:
        description: Новое название категории
        example: Frontend разработка
        type: string
    required:
    - name
    type: object
  presenter.UserProfileResponse:
    properties:
      activeFrame:
        $ref: '#/definitions/presenter.FrameResponse'
      avatar:
        example: https://minio.local/avatar_1.png
        type: string
      exp:
        example: 45
        type: integer
      expToNextLevel:
        example: 55
        type: integer
      fullName:
        example: Ivan Ivanov
        type: string
      id:
        example: 1
        type: integer
      level:
        example: 1
        type: integer
      login:
        example: teacher01
        type: string
      phoneNumber:
        example: "+79001234567"
        type: string
      roleId:
        example: 2
        type: integer
      stars:
        example: 10
        type: integer
      streak:
        example: 4
        type: integer
      studentCode:
        example: STU-8A7KQ21M
        type: string
    type: object
host: localhost:3000
info:
  contact: {}
  description: This is Rest Api for Fluffy Doodle
  termsOfService: http://swagger.io/terms/
  title: Fluffy Doodle REST API
  version: "1.0"
paths:
  /admin/categories:
    post:
      consumes:
      - application/json
      description: Creates a new course category
      parameters:
      - description: Category payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/presenter.InsertCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/presenter.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Create course category
      tags:
      - course-categories
  /admin/categories/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes category by id
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenter.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Delete course category
      tags:
      - course-categories
    put:
      consumes:
      - application/json
      description: Updates category by id
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Category payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/presenter.UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenter.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Update course category
      tags:
      - course-categories
  /admin/courses:
    post:
      consumes:
      - multipart/form-data
      description: Creates a new course with image, category and level
      parameters:
      - description: Course title
        in: formData
        name: title
        required: true
        type: string
      - description: Course description
        in: formData
        name: description
        required: true
        type: string
      - description: Course category ID
        in: formData
        name: categoryId
        required: true
        type: integer
      - description: 'Course level: beginner|intermediate|advanced'
        in: formData
        name: level
        required: true
        type: string
      - description: Course hours
        in: formData
        name: hours
        required: true
        type: integer
      - description: Course image
        in: formData
        name: image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/presenter.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Create course
      tags:
      - courses
  /admin/courses/{id}:
    delete:
      description: Deletes course by ID
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenter.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Delete course
      tags:
      - courses
    put:
      consumes:
      - multipart/form-data
      description: Updates existing course
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      - description: Course title
        in: formData
        name: title
        required: true
        type: string
      - description: Course description
        in: formData
        name: description
        required: true
        type: string
      - description: Course category ID
        in: formData
        name: categoryId
        required: true
        type: integer
      - description: 'Course level: beginner|intermediate|advanced'
        in: formData
        name: level
        required: true
        type: string
      - description: Course hours
        in: formData
        name: hours
        required: true
        type: integer
      - description: Course image
        in: formData
        name: image
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenter.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Update course
      tags:
      - courses
  /admin/courses/{id}/lessons:
    post:
      consumes:
      - application/json
      description: Creates lesson for selected course
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      - description: Lesson payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/presenter.CreateLessonRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/presenter.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Create lesson in course
      tags:
      - courses
  /auth/is-admin:
    get:
      consumes:
      - application/json
      description: Checks role (protected endpoint)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenter.AuthSwaggerSuccessResponse'
      summary: Check role
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logout
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenter.AuthSwaggerSuccessResponse'
      summary: Exit
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh access and refresh tokens
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenter.AuthSwaggerSuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.AuthSwaggerErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.AuthSwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.AuthSwaggerErrorResponse'
      summary: Update tokens
      tags:
      - auth
  /auth/sign-in:
    post:
      consumes:
      - application/json
      description: User login
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/presenter.SignInRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenter.AuthSwaggerSuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.AuthSwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.AuthSwaggerErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.AuthSwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.AuthSwaggerErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/sign-up:
    post:
      consumes:
      - application/json
      description: Student signs up without code. Parent signs up with studentCode.
      parameters:
      - description: Sign up payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/presenter.SignUpRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/presenter.AuthSwaggerSuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.AuthSwaggerErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.AuthSwaggerErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/presenter.AuthSwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.AuthSwaggerErrorResponse'
      summary: Registration
      tags:
      - auth
  /categories:
    get:
      consumes:
      - application/json
      description: Returns all course categories
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenter.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: List course categories
      tags:
      - course-categories
  /categories/{id}:
    get:
      consumes:
      - application/json
      description: Returns a category by its id
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenter.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Get course category by id
      tags:
      - course-categories
  /courses:
    get:
      description: Returns all courses
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenter.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: List courses
      tags:
      - courses
  /courses/{id}:
    get:
      description: Returns course detail by id
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenter.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Get course by ID
      tags:
      - courses
  /courses/{id}/lessons:
    get:
      description: Returns ordered lessons for course
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenter.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: List course lessons
      tags:
      - courses
  /forum/categories:
    get:
      description: Returns a list of forum categories
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/presenter.ForumCategoryResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Get forum categories
      tags:
      - forum
    post:
      consumes:
      - application/json
      description: Creates a new forum category
      parameters:
      - description: Category data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/presenter.CreateForumCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/presenter.ForumCategoryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Create forum category
      tags:
      - forum
  /forum/comments/{id}/solution:
    put:
      description: Marks a specific comment as the solution to the topic (only topic
        author can do this)
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Topic ID
        in: query
        name: topicId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenter.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Mark comment as solution
      tags:
      - forum
  /forum/topics:
    get:
      description: Returns a list of forum topics. Can be filtered by categoryId.
      parameters:
      - description: Category ID
        in: query
        name: categoryId
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/presenter.ForumTopicResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Get forum topics
      tags:
      - forum
    post:
      consumes:
      - application/json
      description: Creates a new forum topic
      parameters:
      - description: Topic data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/presenter.CreateForumTopicRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/presenter.ForumTopicResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Create topic
      tags:
      - forum
  /forum/topics/{id}:
    get:
      description: Returns topic details along with comments
      parameters:
